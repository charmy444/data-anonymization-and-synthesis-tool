services:
  backend:
    build:
      context: .
      dockerfile: dockerfiles/backend.Dockerfile
    environment:
      SDA_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: dockerfiles/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - "3000:3000"
